<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>預約日期區塊預覽</title>
    <style>
        * {
            --color-border: #ddd;
            --color-text-muted: #999;
            --color-primary-dark: #333;
            --radius-md: 8px;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            padding: 20px;
            background: #f5f5f5;
        }

        .preview-container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        h3 {
            margin: 0 0 20px 0;
            color: #333;
            font-size: 18px;
        }

        .calendar-section {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .calendar-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
        }

        .calendar-header h2 {
            margin: 0;
            font-size: 16px;
            font-weight: 600;
        }

        .calendar-toolbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
        }

        .month-title {
            text-align: center;
            flex: 1;
            font-size: 16px;
            font-weight: 600;
        }

        .calendar-body {
            width: 100%;
            border: 1px solid var(--color-border);
            border-radius: var(--radius-md);
            padding: 16px;
            background: #fff;
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 8px;
        }

        .btn {
            padding: 6px 12px;
            border: 1px solid #ddd;
            border-radius: 4px;
            background: #f5f5f5;
            cursor: pointer;
            font-size: 13px;
        }

        .btn-primary {
            background: #4caf50;
            color: white;
            border: none;
        }

        .btn-ghost {
            background: transparent;
            border: 1px solid #ddd;
        }

        .weekday {
            text-align: center;
            font-weight: 600;
            padding: 8px;
            font-size: 13px;
            color: var(--color-text-muted);
        }

        .day-cell {
            border: 1px solid #ddd;
            border-radius: 6px;
            padding: 8px;
            background: #fff;
            aspect-ratio: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
        }

        .day-cell.has-appt {
            border: 2px solid #4caf50;
            background: #e8f5e9;
        }

        .day-empty {
            opacity: 0.3;
        }

        /* 手機版 */
        @media (max-width: 767px) {
            .calendar-header {
                flex-direction: column;
                align-items: flex-start;
                gap: 12px;
            }

            .calendar-header h2 {
                font-size: 15px;
                width: 100%;
            }

            .calendar-header .btn {
                font-size: 12px;
                padding: 6px 10px;
                align-self: flex-end;
            }

            .calendar-toolbar .btn {
                font-size: 12px;
                padding: 6px 10px;
            }

            .month-title {
                font-size: 15px;
            }
        }
    </style>
</head>
<body>
    <div class="preview-container">
        <h3>🖥️ 電腦版預覽（寬螢幕）</h3>
        <div class="calendar-section">
            <div class="calendar-header">
                <h2>📅 預約日期</h2>
                <button class="btn btn-primary">+ 新增不可預約</button>
            </div>

            <div class="calendar-toolbar">
                <button class="btn btn-ghost">← 上月</button>
                <div class="month-title">2026 年 7 月</div>
                <button class="btn btn-ghost">下月 →</button>
            </div>

            <div class="calendar-body">
                <div class="weekday">日</div>
                <div class="weekday">一</div>
                <div class="weekday">二</div>
                <div class="weekday">三</div>
                <div class="weekday">四</div>
                <div class="weekday">五</div>
                <div class="weekday">六</div>

                <div class="day-cell day-empty">-</div>
                <div class="day-cell day-empty">-</div>
                <div class="day-cell day-empty">-</div>
                <div class="day-cell">1</div>
                <div class="day-cell">2</div>
                <div class="day-cell has-appt">3</div>
                <div class="day-cell">4</div>
                <div class="day-cell">5</div>
                <div class="day-cell has-appt">6</div>
                <div class="day-cell">7</div>
                <div class="day-cell">8</div>
                <div class="day-cell">9</div>
                <div class="day-cell">10</div>
                <div class="day-cell has-appt">11</div>
            </div>
        </div>
    </div>

    <hr style="margin: 40px 0;">

    <div class="preview-container" style="max-width: 400px;">
        <h3>📱 手機版預覽（窄螢幕）</h3>
        <style>
            .mobile-preview {
                max-width: 400px;
                margin: 0 auto;
            }

            .mobile-preview .calendar-header {
                flex-direction: column;
                align-items: flex-start;
                gap: 12px;
            }

            .mobile-preview .calendar-header h2 {
                font-size: 15px;
                width: 100%;
            }

            .mobile-preview .calendar-header .btn {
                font-size: 12px;
                padding: 6px 10px;
                align-self: flex-end;
            }

            .mobile-preview .calendar-toolbar .btn {
                font-size: 12px;
                padding: 6px 10px;
            }

            .mobile-preview .month-title {
                font-size: 15px;
            }
        </style>

        <div class="calendar-section mobile-preview">
            <div class="calendar-header">
                <h2>📅 預約日期</h2>
                <button class="btn btn-primary">+ 新增不可預約</button>
            </div>

            <div class="calendar-toolbar">
                <button class="btn btn-ghost">← 上月</button>
                <div class="month-title">2026 年 7 月</div>
                <button class="btn btn-ghost">下月 →</button>
            </div>

            <div class="calendar-body">
                <div class="weekday">日</div>
                <div class="weekday">一</div>
                <div class="weekday">二</div>
                <div class="weekday">三</div>
                <div class="weekday">四</div>
                <div class="weekday">五</div>
                <div class="weekday">六</div>

                <div class="day-cell day-empty">-</div>
                <div class="day-cell day-empty">-</div>
                <div class="day-cell day-empty">-</div>
                <div class="day-cell">1</div>
                <div class="day-cell">2</div>
                <div class="day-cell has-appt">3</div>
                <div class="day-cell">4</div>
                <div class="day-cell">5</div>
                <div class="day-cell has-appt">6</div>
                <div class="day-cell">7</div>
                <div class="day-cell">8</div>
                <div class="day-cell">9</div>
                <div class="day-cell">10</div>
                <div class="day-cell has-appt">11</div>
            </div>
        </div>
    </div>
</body>
</html>
